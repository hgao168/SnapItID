name: iOS Build & Deploy to TestFlight

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy to TestFlight
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: |
          # Use the newest Xcode available on this runner
          XCODE=$(ls /Applications | grep -E '^Xcode[_.]?[0-9]' | sort -V | tail -1)
          if [ -n "$XCODE" ]; then
            sudo xcode-select -s "/Applications/$XCODE/Contents/Developer"
          fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: iOS
        run: xcodegen generate --spec project.yml

      # ── Signing ──────────────────────────────────────────────────────────────

      - name: Import signing certificate
        env:
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import the .p12 certificate
          echo "$IOS_CERTIFICATE_P12" | base64 --decode -o "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          # Make it the default keychain for the build
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          IOS_PROVISION_PROFILE: ${{ secrets.IOS_PROVISION_PROFILE }}
        run: |
          PP_PATH="$RUNNER_TEMP/SnapItID.mobileprovision"
          echo "$IOS_PROVISION_PROFILE" | base64 --decode -o "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          # Use the UUID of the profile as the filename
          UUID=$(security cms -D -i "$PP_PATH" | \
                 plutil -extract UUID raw -)
          cp "$PP_PATH" \
            ~/Library/MobileDevice/Provisioning\ Profiles/"${UUID}".mobileprovision

      # ── Build ─────────────────────────────────────────────────────────────────

      - name: Generate app icon
        run: |
          SRC="web/images/SnapItID.png"
          DEST="iOS/SnapItID/Assets.xcassets/AppIcon.appiconset"
          # Single universal 1024x1024 icon (Xcode 14+ single-size format)
          sips -z 1024 1024 "$SRC" --out "$DEST/AppIcon-1024.png"

      - name: Archive app
        run: |
          xcodebuild archive \
            -project iOS/SnapItID.xcodeproj \
            -scheme SnapItID \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/SnapItID.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="SnapItID" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            MARKETING_VERSION=1.0

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/SnapItID.xcarchive" \
            -exportOptionsPlist ".github/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

          echo "Export contents:"
          ls -la "$RUNNER_TEMP/export/"

      # ── Upload ────────────────────────────────────────────────────────────────

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          # Write the .p8 private key where altool expects it
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY" \
            > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

          IPA_PATH=$(find "$RUNNER_TEMP/export" -name "*.ipa" | head -1)
          echo "Uploading: $IPA_PATH"

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey  "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --verbose

      # ── Clean-up ──────────────────────────────────────────────────────────────

      - name: Remove temporary keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
