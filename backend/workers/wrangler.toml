# SnapItID Workers Configuration
# API token is read from CLOUDFLARE_API_TOKEN env variable - never commit secrets.

# NOTE: account_id should ideally be set via CLOUDFLARE_ACCOUNT_ID env var
# or via `wrangler deploy --account-id <id>`. The API token must have minimal
# permissions (Workers deployment only, NOT account-level admin).
account_id = "bad51048dc7dc962fa272465081d5d2c"
compatibility_date = "2024-12-01"

# ---- Compliance Check Worker ----
name = "snapitid-compliance"
main = "compliance-check/index.ts"

routes = [
  { pattern = "api.snapitid.ai/api/compliance/*", zone_id = "c2ef57b04873856e2870a8fe0ef571c3" }
]

# KV namespace ID — managed via Cloudflare dashboard / wrangler.toml.
# This ID alone does NOT grant access; only CLOUDFLARE_API_TOKEN with proper scoping does.
[[kv_namespaces]]
binding = "SNAPITID_KV"
id = "b07b21c27d4c48acaf8332dfe2b9abbf"
