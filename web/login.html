<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnapItID | Login & Registration</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container-auth {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .auth-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .auth-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 32px 24px;
      text-align: center;
    }

    .auth-header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .auth-header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .auth-tabs {
      display: flex;
      border-bottom: 1px solid #e0e0e0;
    }

    .auth-tab {
      flex: 1;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      font-weight: 600;
      color: #999;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
    }

    .auth-tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .auth-content {
      padding: 32px 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-group input::placeholder {
      color: #999;
    }

    .btn-submit {
      width: 100%;
      padding: 12px 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .error-message {
      background-color: #fee;
      color: #c33;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      border-left: 4px solid #c33;
    }

    .success-message {
      background-color: #efe;
      color: #3c3;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      border-left: 4px solid #3c3;
    }

    .password-requirements {
      font-size: 12px;
      color: #999;
      margin-top: 8px;
    }

    .password-requirements li {
      margin-bottom: 4px;
    }

    .signup-form {
      display: none;
    }

    .signup-form.active {
      display: block;
    }

    .login-form {
      display: block;
    }

    .login-form.active {
      display: block;
    }

    .form-divider {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin: 16px 0;
    }

    .footer-text {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-top: 16px;
    }

    .footer-text a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 16px;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="container-auth">
    <div class="auth-card">
      <div class="auth-header">
        <h1>SnapItID</h1>
        <p>AI Passport & Visa Photo Studio</p>
      </div>

      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchTab('login')">Sign In</div>
        <div class="auth-tab" onclick="switchTab('signup')">Create Account</div>
      </div>

      <div class="auth-content">
        <div id="message-container"></div>

        <!-- Login Form -->
        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label for="loginEmail">Email Address</label>
            <input
              type="email"
              id="loginEmail"
              name="email"
              placeholder="your@email.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input
              type="password"
              id="loginPassword"
              name="password"
              placeholder="••••••••"
              required
            />
          </div>

          <button type="submit" class="btn-submit">Sign In</button>
        </form>

          <div style="text-align: center; margin-top: 16px;">
            <a href="#" id="forgotPasswordLink" style="color: #667eea; text-decoration: none; font-size: 14px; font-weight: 500;">Forgot Password?</a>
          </div>

        <!-- Signup Form -->
        <form id="signupForm" class="signup-form">
          <div class="form-group">
            <label for="signupName">Full Name</label>
            <input
              type="text"
              id="signupName"
              name="name"
              placeholder="John Doe"
              required
            />
          </div>

          <div class="form-group">
            <label for="signupEmail">Email Address</label>
            <input
              type="email"
              id="signupEmail"
              name="email"
              placeholder="your@email.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="signupPlan">Plan</label>
            <select id="signupPlan" name="plan" required>
              <option value="free">Free</option>
              <option value="pro">Pro Monthly</option>
              <option value="lifetime">Lifetime</option>
            </select>
          </div>

          <div class="form-group">
            <label for="signupPassword">Password</label>
            <input
              type="password"
              id="signupPassword"
              name="password"
              placeholder="••••••••"
              minlength="8"
              required
            />
            <div class="password-requirements">
              <ul style="margin-left: 20px;">
                <li>At least 8 characters</li>
              </ul>
            </div>
          </div>

          <div class="form-group">
            <label for="signupPasswordConfirm">Confirm Password</label>
            <input
              type="password"
              id="signupPasswordConfirm"
              name="passwordConfirm"
              placeholder="••••••••"
              required
            />
          </div>

          <button type="submit" class="btn-submit">Create Account</button>
        </form>

        <div class="loading" id="loading">
          <div class="spinner"></div>
          <p style="margin-top: 8px; font-size: 14px; color: #667eea;">
            Processing...
          </p>
        </div>
      </div>
    </div>

    <div style="text-align: center; margin-top: 24px; color: white; font-size: 12px;">
      <p>By signing in, you agree to our Terms of Service and Privacy Policy</p>
    </div>
  </div>

  <script>
    const API_BASE = "https://api.snapitid.ai";

    function switchTab(tab) {
      document.querySelectorAll(".auth-tab").forEach((el) => {
        el.classList.remove("active");
      });
      document.querySelectorAll(".login-form, .signup-form").forEach((el) => {
        el.classList.remove("active");
      });

      if (tab === "login") {
        document.querySelectorAll(".auth-tab")[0].classList.add("active");
        document.querySelector(".login-form").classList.add("active");
      } else {
        document.querySelectorAll(".auth-tab")[1].classList.add("active");
        document.querySelector(".signup-form").classList.add("active");
      }

      clearMessages();
    }

    function showMessage(message, type = "error") {
      const container = document.getElementById("message-container");
      container.innerHTML = `<div class="${type}-message">${message}</div>`;
    }

    function clearMessages() {
      document.getElementById("message-container").innerHTML = "";
    }

    function setLoading(loading) {
      document.getElementById("loading").style.display = loading
        ? "block"
        : "none";
    }

    function getRequestedUpgradePlan() {
      const params = new URLSearchParams(window.location.search || "");
      const upgrade = params.get("upgrade");
      if (upgrade === "pro" || upgrade === "lifetime") {
        return upgrade;
      }

      const stored = localStorage.getItem("snapitid_pending_upgrade_plan") || "";
      return stored === "pro" || stored === "lifetime" ? stored : null;
    }

    function persistUpgradeIntent(plan) {
      if (plan === "pro" || plan === "lifetime") {
        localStorage.setItem("snapitid_pending_upgrade_plan", plan);
        return;
      }

      localStorage.removeItem("snapitid_pending_upgrade_plan");
    }

    function getPostAuthRedirect(plan) {
      if (plan === "pro" || plan === "lifetime") {
        return `/?upgrade=${encodeURIComponent(plan)}#pricing`;
      }

      return "/";
    }

    const requestedUpgradePlan = getRequestedUpgradePlan();
    if (requestedUpgradePlan) {
      const signupPlan = document.getElementById("signupPlan");
      if (signupPlan) {
        signupPlan.value = requestedUpgradePlan;
      }
    }

    document
      .getElementById("loginForm")
      .addEventListener("submit", async (e) => {
        e.preventDefault();
        clearMessages();
        setLoading(true);

        const email = document.getElementById("loginEmail").value;
        const password = document.getElementById("loginPassword").value;

        try {
          const response = await fetch(`${API_BASE}/api/payments/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await response.json();

          if (!response.ok) {
            showMessage(data.error || "Login failed");
            setLoading(false);
            return;
          }

          // Save token and user info
          localStorage.setItem("snapitid_token", data.result.token);
          localStorage.setItem("snapitid_user_id", data.result.id);
          localStorage.setItem("snapitid_user_email", data.result.email);
          localStorage.setItem("snapitid_user_name", data.result.name);
          localStorage.setItem("snapitid_plan", data.result.tier);

          const upgradePlan = getRequestedUpgradePlan();
          persistUpgradeIntent(upgradePlan);

          showMessage("Login successful! Redirecting...", "success");
          setTimeout(() => {
            window.location.href = getPostAuthRedirect(upgradePlan);
          }, 1500);
        } catch (error) {
          showMessage("Network error. Please try again.");
          setLoading(false);
        }
      });

    document
      .getElementById("signupForm")
      .addEventListener("submit", async (e) => {
        e.preventDefault();
        clearMessages();

        const name = document.getElementById("signupName").value;
        const email = document.getElementById("signupEmail").value;
        const plan = document.getElementById("signupPlan").value;
        const password = document.getElementById("signupPassword").value;
        const passwordConfirm =
          document.getElementById("signupPasswordConfirm").value;

        if (password !== passwordConfirm) {
          showMessage("Passwords do not match");
          return;
        }

        if (password.length < 8) {
          showMessage("Password must be at least 8 characters");
          return;
        }

        setLoading(true);

        try {
          const response = await fetch(`${API_BASE}/api/payments/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password, name }),
          });

          const data = await response.json();

          if (!response.ok) {
            showMessage(data.error || "Registration failed");
            setLoading(false);
            return;
          }

          // Save token and user info
          localStorage.setItem("snapitid_token", data.result.token);
          localStorage.setItem("snapitid_user_id", data.result.id);
          localStorage.setItem("snapitid_user_email", data.result.email);
          localStorage.setItem("snapitid_user_name", data.result.name);
          localStorage.setItem("snapitid_plan", data.result.tier);

          persistUpgradeIntent(plan);

          showMessage(
            plan === "free"
              ? "Account created! Redirecting..."
              : `Account created. Redirecting so you can upgrade to ${plan === "pro" ? "Pro Monthly" : "Lifetime"}.`,
            "success"
          );
          setTimeout(() => {
            window.location.href = getPostAuthRedirect(plan);
          }, 1500);
        } catch (error) {
          showMessage("Network error. Please try again.");
          setLoading(false);
        }
      });

      // Forgot password link
      const forgotPasswordLink = document.getElementById("forgotPasswordLink");
      if (forgotPasswordLink) {
        forgotPasswordLink.addEventListener("click", (e) => {
          e.preventDefault();
          const email = document.getElementById("loginEmail").value.trim();
          if (!email) {
            showMessage("Please enter your email address first");
            return;
          }
        
          setLoading(true);
          clearMessages();
        
          fetch(`${API_BASE}/api/payments/forgot-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          })
            .then((res) => res.json())
            .then((data) => {
              setLoading(false);
              if (!data.success) {
                showMessage(data.error || "Failed to send reset request");
                return;
              }

              showMessage("Password reset email sent. Check your inbox for the reset link.", "success");
            })
            .catch(() => {
              setLoading(false);
              showMessage("Network error. Please try again.");
            });
        });
      }

    // Check if user is already logged in
    window.addEventListener("load", () => {
      const token = localStorage.getItem("snapitid_token");
      if (token) {
        window.location.href = getPostAuthRedirect(getRequestedUpgradePlan());
      }
    });
  </script>
</body>
</html>
