<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnapItID | Reset Password</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container-auth {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .auth-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .auth-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 32px 24px;
      text-align: center;
    }

    .auth-header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .auth-header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .auth-content {
      padding: 32px 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-group input::placeholder {
      color: #999;
    }

    .btn-submit {
      width: 100%;
      padding: 12px 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .error-message {
      background-color: #fee;
      color: #c33;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      border-left: 4px solid #c33;
    }

    .success-message {
      background-color: #efe;
      color: #3c3;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      border-left: 4px solid #3c3;
    }

    .password-requirements {
      font-size: 12px;
      color: #999;
      margin-top: 8px;
    }

    .password-requirements li {
      margin-bottom: 4px;
    }

    .back-link {
      text-align: center;
      margin-top: 16px;
    }

    .back-link a {
      color: #667eea;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 16px;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="container-auth">
    <div class="auth-card">
      <div class="auth-header">
        <h1>SnapItID</h1>
        <p>Reset Password</p>
      </div>

      <div class="auth-content">
        <div id="message-container"></div>

        <form id="resetForm">
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input
              type="password"
              id="newPassword"
              name="password"
              placeholder="••••••••"
              minlength="8"
              required
            />
            <div class="password-requirements">
              <ul style="margin-left: 20px;">
                <li>At least 8 characters</li>
              </ul>
            </div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              placeholder="••••••••"
              required
            />
          </div>

          <button type="submit" class="btn-submit">Reset Password</button>
        </form>

        <div class="loading" id="loading">
          <div class="spinner"></div>
          <p style="margin-top: 8px; font-size: 14px; color: #667eea;">
            Processing...
          </p>
        </div>

        <div class="back-link">
          <a href="/login.html">Back to Sign In</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://api.snapitid.ai";

    function getQueryParam(param) {
      const params = new URLSearchParams(window.location.search);
      return params.get(param);
    }

    function showMessage(message, type = "error") {
      const container = document.getElementById("message-container");
      container.innerHTML = `<div class="${type}-message">${message}</div>`;
    }

    function clearMessages() {
      document.getElementById("message-container").innerHTML = "";
    }

    function setLoading(loading) {
      document.getElementById("loading").style.display = loading
        ? "block"
        : "none";
    }

    document.getElementById("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMessages();

      const resetToken = getQueryParam("token");
      if (!resetToken) {
        showMessage("Invalid or missing reset token. Please request a new password reset.");
        return;
      }

      const password = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (password !== confirmPassword) {
        showMessage("Passwords do not match");
        return;
      }

      if (password.length < 8) {
        showMessage("Password must be at least 8 characters");
        return;
      }

      setLoading(true);

      try {
        const response = await fetch(`${API_BASE}/api/payments/reset-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: resetToken, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          showMessage(data.error || "Password reset failed");
          setLoading(false);
          return;
        }

        // Save token and redirect to home
        localStorage.setItem("snapitid_token", data.result.token);
        localStorage.setItem("snapitid_user_id", data.result.id);
        localStorage.setItem("snapitid_user_email", data.result.email);
        localStorage.setItem("snapitid_user_name", data.result.name);
        localStorage.setItem("snapitid_plan", data.result.tier);

        showMessage("Password reset successful! Redirecting...", "success");
        setTimeout(() => {
          window.location.href = "/";
        }, 1500);
      } catch (error) {
        showMessage("Network error. Please try again.");
        setLoading(false);
      }
    });

    // Check if token exists in URL on page load
    window.addEventListener("load", () => {
      const token = getQueryParam("token");
      if (!token) {
        showMessage("Invalid reset link. Please request a new password reset.");
      }
    });
  </script>
</body>
</html>
